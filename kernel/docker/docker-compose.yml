services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: almond
      POSTGRES_PASSWORD: almond
      POSTGRES_DB: almond
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almond -d almond"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --log_bin_trust_function_creators=1
    environment:
      MYSQL_ROOT_PASSWORD: almond
      MYSQL_USER: almond
      MYSQL_PASSWORD: almond
      MYSQL_DATABASE: almond
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "almond", "-palmond"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mysql_data:
