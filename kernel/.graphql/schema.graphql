  title: String!
  description: String
  dueDate: String
  priority: String!
  createdAt: String!
  updatedAt: String!
  workspaceIdentifier: String
  done: Boolean!
}

type TodoConnection {
  pageInfo: PageInfo!
  paginationInfo: PaginationInfo
  nodes: [Todo!]!
  edges: [TodoEdge!]!
}

type TodoEdge {
  cursor: String!
  node: Todo!
}

input TodoFilterInput {
  identifier: TextFilterInput
  title: StringFilterInput
  description: StringFilterInput
  dueDate: TextFilterInput
  priority: StringFilterInput
  createdAt: TextFilterInput
  updatedAt: TextFilterInput
  workspaceIdentifier: TextFilterInput
  done: BooleanFilterInput
  and: [TodoFilterInput!]
  or: [TodoFilterInput!]
  not: TodoFilterInput
}

input TodoHavingInput {
  workspaces: WorkspacesFilterInput
}

input TodoInsertInput {
  identifier: String!
  title: String!
  description: String
  dueDate: String
  priority: String!
  createdAt: String!
  updatedAt: String!
  workspaceIdentifier: String
  done: Boolean!
}

input TodoOrderInput {
  identifier: OrderByEnum
  title: OrderByEnum
  description: OrderByEnum
  dueDate: OrderByEnum
  priority: OrderByEnum
  createdAt: OrderByEnum
  updatedAt: OrderByEnum
  workspaceIdentifier: OrderByEnum
  done: OrderByEnum
}

input TodoUpdateInput {
  identifier: String
  title: String
  description: String
  dueDate: String
  priority: String
  createdAt: String
  updatedAt: String
  workspaceIdentifier: String
  done: Boolean
}

