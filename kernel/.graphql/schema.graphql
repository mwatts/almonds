type Workspaces {
  identifier: String!
  name: String!
  description: String!
  createdAt: String!
  updatedAt: String!
  bookmark(
    filters: BookmarkFilterInput
    orderBy: BookmarkOrderInput
    pagination: PaginationInput
  ): BookmarkConnection!
  notes(
    filters: NotesFilterInput
    orderBy: NotesOrderInput
    pagination: PaginationInput
  ): NotesConnection!
  recycleBin(
    filters: RecycleBinFilterInput
    orderBy: RecycleBinOrderInput
    pagination: PaginationInput
  ): RecycleBinConnection!
  reminder(
    filters: ReminderFilterInput
    orderBy: ReminderOrderInput
    pagination: PaginationInput
  ): ReminderConnection!
  snippets(
    filters: SnippetsFilterInput
    orderBy: SnippetsOrderInput
    pagination: PaginationInput
  ): SnippetsConnection!
  todo(
    filters: TodoFilterInput
    orderBy: TodoOrderInput
    pagination: PaginationInput
  ): TodoConnection!
}

type WorkspacesBasic {
  identifier: String!
  name: String!
  description: String!
  createdAt: String!
  updatedAt: String!
}

type WorkspacesConnection {
