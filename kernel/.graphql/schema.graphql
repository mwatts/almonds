  description: StringFilterInput
  createdAt: TextFilterInput
  updatedAt: TextFilterInput
  and: [WorkspacesFilterInput!]
  or: [WorkspacesFilterInput!]
  not: WorkspacesFilterInput
}

input WorkspacesHavingInput {
  bookmark: BookmarkFilterInput
  notes: NotesFilterInput
  recycleBin: RecycleBinFilterInput
  reminder: ReminderFilterInput
  snippets: SnippetsFilterInput
  todo: TodoFilterInput
}

input WorkspacesInsertInput {
  identifier: String!
  name: String!
  description: String!
  createdAt: String!
  updatedAt: String!
}

input WorkspacesOrderInput {
  identifier: OrderByEnum
